<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Estructura del Poder Judicial de Chile</title>
<style>
  :root{
    --pleno: oklch(0.52 0.15 300);
    --salas: oklch(0.53 0.15 255);
    --civil: oklch(0.55 0.12 158);
    --penal: oklch(0.56 0.17 25);
    --tercera: oklch(0.63 0.15 55);
    --cuarta: oklch(0.68 0.12 88);
    --nb: oklch(0.9 0.012 265);
  }
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: oklch(0.975 0.005 265);
    color: oklch(0.32 0.02 265);
    transition: background-color .25s ease;
  }
  #app{max-width:1200px;margin:0 auto;padding:20px;}

  header.top{
    border-radius:16px;
    padding:22px 26px;
    margin-bottom:18px;
    color:#fff;
    transition: background-color .25s ease;
  }
  header.top.neutral{
    background: oklch(0.32 0.05 265);
  }
  header.top h1{margin:0 0 4px 0;font-size:1.6rem;}
  header.top p{margin:0;opacity:.85;font-size:.95rem;max-width:70ch;}

  .tabs{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;}
  .tab{
    padding:7px 14px;border-radius:999px;border:1px solid var(--nb);
    background:#fff;color: oklch(0.5 0.02 265);
    font-size:.85rem;font-weight:500;cursor:pointer;
    transition:all .15s ease;
  }
  .tab:hover{filter:brightness(0.97);}
  .tab.active{font-weight:600;}

  .columns{
    display:flex;gap:14px;align-items:flex-start;
    overflow-x:auto;padding-bottom:8px;
  }
  .col{
    flex: 0 0 280px;
    display:flex;flex-direction:column;gap:10px;
  }

  .navrow{
    background:#fff;border:1px solid var(--nb);border-radius:12px;
    padding:14px 16px;cursor:pointer;
    box-shadow:0 1px 2px rgba(30,30,60,.05);
    transition: all .15s ease;
  }
  .navrow:hover{transform:translateY(-2px);}
  .navrow .kicker{font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;opacity:.65;margin-bottom:2px;}
  .navrow .title-row{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .navrow .name{font-weight:600;font-size:.98rem;}
  .navrow .dot{width:10px;height:10px;border-radius:50%;flex:0 0 auto;}
  .navrow .tag{font-size:.7rem;padding:2px 8px;border-radius:999px;color:#fff;flex:0 0 auto;}
  .navrow .desc{font-size:.82rem;margin-top:8px;line-height:1.4;opacity:.9;}
  .navrow .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .navrow .chip{
    font-size:.72rem;padding:3px 9px;border-radius:999px;background:#fff;
    border:1px solid var(--nb);
  }
  .navrow .group-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.03em;opacity:.6;margin-top:8px;margin-bottom:4px;}

  .flow{margin-top:28px;}
  .flow h2{font-size:1.05rem;margin-bottom:12px;}
  .flow-row{display:flex;gap:12px;overflow-x:auto;padding-bottom:6px;}
  .flow-step{
    flex:0 0 220px;background:#fff;border:1px solid var(--nb);border-radius:12px;
    padding:14px;position:relative;
  }
  .flow-step .n{
    width:26px;height:26px;border-radius:50%;color:#fff;font-size:.8rem;
    display:flex;align-items:center;justify-content:center;font-weight:700;margin-bottom:8px;
  }
  .flow-step .q{font-weight:600;font-size:.88rem;margin-bottom:6px;}
  .flow-step .items{display:flex;flex-wrap:wrap;gap:5px;}
  .flow-step .items span{font-size:.7rem;padding:2px 7px;border-radius:999px;border:1px solid var(--nb);}
  .flow-step .d{font-size:.8rem;opacity:.85;line-height:1.4;}
  .flow-arrow{align-self:center;font-size:1.2rem;opacity:.35;flex:0 0 auto;}

  footer.note{margin-top:26px;font-size:.78rem;opacity:.55;text-align:center;}

  @media (max-width:640px){
    #app{padding:12px;}
    .col{flex-basis:230px;}
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
(function(){

        materias: [

    ],
    flow: [

  TIERS.ca = {
    title: 'Cortes de Apelaciones',
    root: { desc: '17 tribunales colegiados, superiores jerárquicos de los tribunales de 1ª instancia. Competencia normalmente regional; funcionan en salas de mínimo 3 ministros y actúan en única, primera o segunda instancia.' },
    pleno: {
      color: P.pleno,
      subtitle: 'Las 17 cortes del país',
      desc: 'Cada una es superior jerárquico de los tribunales de su territorio.',

    },
    salasHeader: {

    salas: [

        id: 'ca-2i', kicker: 'Regla general', short: '2ª instancia', color: P.salas,

        materias: [

          { name: 'Recurso de amparo', desc: 'Protección de la libertad personal (Art. 21 CPR).' },
          { name: 'Amparo económico', desc: 'Ley N° 18.971 (Art. 19 N° 21 CPR).' },
          { name: 'Desafuero', desc: 'Diputados, senadores y delegados presidenciales.' },
          { name: 'Querella de capítulos', desc: 'Responsabilidad penal de jueces por actos ministeriales.' },

      { n: '5', q: 'Casación ante la Corte Suprema', color: P.cuarta, desc: 'Contra la sentencia de 2ª instancia procede, en su caso, casación en la forma o en el fondo.' },
    ],
  };

  TIERS.ti = {
    title: 'Primera Instancia',
    root: { desc: 'Base de la estructura judicial. Cada columna es un tipo de tribunal de primera instancia; los tribunales penales se dividen en dos: el Juzgado de Garantía (investigación) y el Tribunal de Juicio Oral en lo Penal, TOP (juicio). Donde no existe un tribunal especializado en la comuna, el Juzgado de Letras Civil / de Competencia Común absorbe sus materias.' },
    pleno: {
      color: P.pleno,
      subtitle: 'Cómo leer este nivel',
      desc: 'Cada columna es un TIPO de tribunal de primera instancia. Los tribunales penales se dividen en dos: el Juzgado de Garantía (investigación) y el Tribunal de Juicio Oral en lo Penal, TOP (juicio).',
    },
    salasHeader: {
      color: P.salas,
      subtitle: 'Cinco tipos de tribunal',
      desc: 'Selecciona un tipo de tribunal para ver sus materias.',
    },
    salas: [
      {
        id: 'ti-civil', kicker: 'Competencia común', short: 'Civiles', color: P.civil,
        summary: 'Juzgados de Letras en lo Civil / de Competencia Común. Absorben materias especializadas donde no hay tribunal propio.',
        materias: [
          { name: 'Contratos y obligaciones', desc: 'Cumplimiento, resolución, indemnización de perjuicios.' },
          { name: 'Bienes y propiedad', desc: 'Dominio, posesión, servidumbres.' },
          { name: 'Juicio ejecutivo', desc: 'Cobro de títulos ejecutivos.' },
          { name: 'Familia y trabajo residual', desc: 'Sólo donde no existe juzgado especializado.' },
          { name: 'Actos judiciales no contenciosos', desc: 'Posesión efectiva, cambio de nombre, etc.' },
          { name: 'Comercial y quiebras', desc: 'Personas naturales y empresas.' },
        ],
      },
      {
        id: 'ti-penal', kicker: 'Garantía + TOP', short: 'Penales', color: P.penal,
        summary: 'Dos tribunales distintos: el Juzgado de Garantía (fase de investigación y control) y el Tribunal de Juicio Oral en lo Penal (juicio).',
        materias: [
          { name: 'Juzgado de Garantía', groups: [
              { label: 'Investigación y control', subs: ['Garantía de derechos del imputado', 'Control de la investigación', 'Detención y medidas cautelares', 'Formalización'] },
              { label: 'Resolución', subs: ['Procedimiento abreviado', 'Procedimiento simplificado', 'Faltas y Ley de Alcoholes', 'Ejecución de condenas'] },
            ] },
          { name: 'Tribunal de Juicio Oral (TOP)', groups: [
              { label: 'Juicio', subs: ['Juicio oral (3 jueces)', 'Crímenes y simples delitos', 'Sentencia definitiva'] },
              { label: 'Impugnación', subs: ['No apelable: se recurre por nulidad', 'Ante la Corte de Apelaciones o Corte Suprema'] },
            ] },
        ],
      },

        summary: 'Juzgados de Familia (Ley 19.968). Procedimiento oral y concentrado, con mediación previa obligatoria en ciertas materias.',
        materias: [
          { name: 'Filiación y cuidado', desc: 'Cuidado personal, relación directa y regular, patria potestad.' },
          { name: 'Alimentos', desc: 'Pensiones alimenticias.' },
          { name: 'Divorcio y nulidad', desc: 'Divorcio, nulidad matrimonial y uniones civiles.' },
          { name: 'Violencia intrafamiliar (VIF)', desc: 'Actos de violencia en el ámbito familiar.' },

          { name: 'Adopción', desc: 'Procedimientos de adopción.' },
          { name: 'Procedimiento', desc: 'Oral y concentrado, con mediación previa obligatoria en ciertas materias.' },
        ],
      },

        id: 'ti-laboral', kicker: 'Código del Trabajo', short: 'Laborales', color: P.penal,

        materias: [
          { name: 'Ejecución de títulos laborales', desc: 'Sentencias y otros títulos ejecutivos laborales.' },
          { name: 'Cobranza previsional', desc: 'Cotizaciones adeudadas (AFP, salud).' },
          { name: 'Trámite ejecutivo', desc: 'Liquidación, notificación y requerimiento de pago.' },
          { name: 'Oposición', desc: 'Pago, novación, remisión, prescripción.' },
        ],
      },
    ],
    flow: [
      { n: '1', q: 'Dónde ingresa la causa', color: P.civil, items: ['Civil', 'Penal', 'Familia', 'Laboral', 'Cobranza'] },
      { n: '2', q: 'Tribunal competente', color: P.salas, desc: 'Se determina por la materia y el territorio; a falta de tribunal especializado, conoce el Juzgado de Letras Civil.' },

      { n: '4', q: 'Sentencia', color: P.penal, desc: 'El tribunal de 1ª instancia resuelve el asunto.' },
      { n: '5', q: 'Recurso', color: P.cuarta, desc: 'Apelación ante la Corte de Apelaciones (o nulidad, en materia penal, contra la sentencia del TOP).' },

  // ---- state ----
  var state = { tier: 'cs', openTop: 'salas', openSala: null, openMateria: null, openPlenoItem: null };

  function tierData(){ return TIERS[state.tier] || TIERS.cs; }

  function el(tag, attrs, children){
    var e = document.createElement(tag);
    attrs = attrs || {};
    for (var k in attrs){
      if (k === 'class') e.className = attrs[k];
      else if (k === 'style') e.setAttribute('style', attrs[k]);
      else if (k === 'onClick') e.addEventListener('click', attrs[k]);
      else e.setAttribute(k, attrs[k]);
    }
    (children || []).forEach(function(c){
      if (c === null || c === undefined) return;
      if (typeof c === 'string') e.appendChild(document.createTextNode(c));
      else e.appendChild(c);
    });
    return e;
  }

  function navRow(opts){
    // opts: {color, name, kicker, tag, active, desc, subs, groups, onClick}
    var classes = 'navrow';
    var row = el('div', { class: classes, style: opts.active ? ('border-color:' + opts.color + ';box-shadow:0 12px 28px -16px ' + opts.color) : '', onClick: opts.onClick }, []);

    var titleRow = el('div', { class: 'title-row' }, [
      el('span', { class: 'dot', style: 'background:' + opts.color }, []),
      el('span', { class: 'name', style:'flex:1' }, [opts.name]),
      opts.tag ? el('span', { class:'tag', style:'background:' + opts.color }, [opts.tag]) : null,
    ]);

    if (opts.kicker) {
      row.appendChild(el('div', { class: 'kicker' }, [opts.kicker]));
    }
    row.appendChild(titleRow);

    if (opts.active) {
      if (opts.desc) {
        row.appendChild(el('div', { class: 'desc' }, [opts.desc]));
      }
      if (opts.subs && opts.subs.length) {
        var chips = el('div', { class: 'chips' }, []);
        opts.subs.forEach(function(t){
          var label = typeof t === 'string' ? t : (t.title || t.name || '');
          chips.appendChild(el('span', { class: 'chip' }, [label]));
        });
        row.appendChild(chips);
      }
      if (opts.groups && opts.groups.length) {
        opts.groups.forEach(function(g){
          row.appendChild(el('div', { class: 'group-label' }, [g.label]));
          var chips = el('div', { class: 'chips' }, []);
          (g.subs || []).forEach(function(t){
            chips.appendChild(el('span', { class: 'chip' }, [t]));
          });
          row.appendChild(chips);
        });
      }
    }
    return row;
  }

  function toggleTop(id){
    state.openTop = (state.openTop === id) ? null : id;
    state.openSala = null; state.openMateria = null; state.openPlenoItem = null;
    render();
  }
  function toggleSala(id){
    state.openSala = (state.openSala === id) ? null : id;
    state.openMateria = null;
    render();
  }
  function toggleMateria(i){
    state.openMateria = (state.openMateria === i) ? null : i;
    render();
  }
  function togglePlenoItem(i){
    state.openPlenoItem = (state.openPlenoItem === i) ? null : i;
    render();
  }
  function switchTier(id){
    state.tier = id; state.openTop = 'salas'; state.openSala = null; state.openMateria = null; state.openPlenoItem = null;
    render();
  }

  function render(){
    var D = tierData();
    var app = document.getElementById('app');
    app.innerHTML = '';

    var openPleno = state.openTop === 'pleno';
    var openSalas = state.openTop === 'salas';

    var plenoHasItems = !!(D.pleno && D.pleno.items && D.pleno.items.length);

    // active color for header theming
    var activeColor = null;
    if (openSalas) {
      var sa = D.salas.filter(function(x){ return x.id === state.openSala; })[0];
      activeColor = sa ? sa.color : D.salasHeader.color;
    } else if (openPleno) {
      activeColor = D.pleno.color;
    }

    // header
    var header = el('header', { class: 'top neutral', style: activeColor ? ('background:' + activeColor) : '' }, [
      el('h1', {}, [D.title]),
      el('p', {}, [D.root.desc]),
    ]);
    var tabs = el('div', { class: 'tabs' }, []);
    ['cs','ca','ti'].forEach(function(id){
      var t = TIERS[id];
      var active = state.tier === id;
      tabs.appendChild(el('button', {
        class: 'tab' + (active ? ' active' : ''),
        style: active ? ('background:#fff;color:' + (activeColor || 'oklch(0.52 0.15 300)') + ';border-color:' + (activeColor || 'oklch(0.52 0.15 300)')) : 'background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.35)',
        onClick: function(){ switchTier(id); },
      }, [t.title]));
    });
    header.appendChild(tabs);
    app.appendChild(header);

    // columns
    var columns = el('div', { class: 'columns' }, []);

    // column 1
    var col1 = el('div', { class: 'col' }, []);
    if (plenoHasItems) {
      col1.appendChild(navRow({
        color: D.pleno.color,
        name: D.pleno.subtitle || 'Tribunal Pleno',
        kicker: state.tier === 'cs' ? 'Órgano superior' : 'Las cortes',
        active: openPleno,
        onClick: function(){ toggleTop('pleno'); },
      }));
    }
    col1.appendChild(navRow({
      color: D.salasHeader.color,
      name: D.salasHeader.subtitle || 'Salas Especializadas',
      active: openSalas,
      onClick: function(){ toggleTop('salas'); },
    }));
    columns.appendChild(col1);

    // column 2
    if (openPleno && plenoHasItems) {
      var col2 = el('div', { class: 'col' }, []);
      D.pleno.items.forEach(function(it, i){
        col2.appendChild(navRow({
          color: D.pleno.color,
          name: it.title,
          active: state.openPlenoItem === i,
          desc: it.desc,
          onClick: function(){ togglePlenoItem(i); },
        }));
      });
      columns.appendChild(col2);
    } else if (openSalas) {
      var col2b = el('div', { class: 'col' }, []);
      D.salas.forEach(function(sa2){
        col2b.appendChild(navRow({
          color: sa2.color,
          name: sa2.short,
          kicker: sa2.kicker,
          active: state.openSala === sa2.id,
          desc: sa2.summary,
          onClick: function(){ toggleSala(sa2.id); },
        }));
      });
      columns.appendChild(col2b);
    }

    // column 3 - materias
    if (openSalas && state.openSala) {
      var saSel = D.salas.filter(function(x){ return x.id === state.openSala; })[0];
      var col3 = el('div', { class: 'col' }, []);
      saSel.materias.forEach(function(m, i){
        var multi = !!(m.subs && m.subs.length);
        var grp = !!(m.groups && m.groups.length);
        var gcount = grp ? m.groups.reduce(function(a,g){ return a + (g.subs ? g.subs.length : 0); }, 0) : 0;
        col3.appendChild(navRow({
          color: saSel.color,
          name: m.name,
          tag: multi ? (m.subs.length + ' temas') : (grp ? (gcount + ' temas') : ''),
          active: state.openMateria === i,
          desc: m.desc,
          subs: m.subs,
          groups: m.groups,
          onClick: function(){ toggleMateria(i); },
        }));
      });
      columns.appendChild(col3);
    }

    app.appendChild(columns);

    // flow diagram
    var flowSection = el('div', { class: 'flow' }, [
      el('h2', {}, ['Cómo se resuelve una causa']),
    ]);
    var flowRow = el('div', { class: 'flow-row' }, []);
    D.flow.forEach(function(f, i){
      var step = el('div', { class: 'flow-step', style:'border-top:3px solid ' + f.color }, [
        el('div', { class: 'n', style: 'background:' + f.color }, [f.n]),
        el('div', { class: 'q' }, [f.q]),
      ]);
      if (f.items && f.items.length) {
        var itemsWrap = el('div', { class: 'items' }, []);
        f.items.forEach(function(t){ itemsWrap.appendChild(el('span', {}, [t])); });
        step.appendChild(itemsWrap);
      }
      if (f.desc) step.appendChild(el('div', { class: 'd' }, [f.desc]));
      flowRow.appendChild(step);
      if (i < D.flow.length - 1) flowRow.appendChild(el('div', { class: 'flow-arrow' }, ['→']));
    });
    flowSection.appendChild(flowRow);
    app.appendChild(flowSection);

    app.appendChild(el('footer', { class: 'note' }, ['Guía referencial de la estructura del Poder Judicial de Chile. No constituye asesoría legal.']));
  }

  render();
})();
</script>
</body>
</html>
